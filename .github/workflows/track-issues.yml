                      item { id }
                    }
                  }
                `, { projectId: project.id, contentId: issue.data.node_id });

                const itemId = addResult.addProjectV2ItemById.item.id;

                // Update status
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
